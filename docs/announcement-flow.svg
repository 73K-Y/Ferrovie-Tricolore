<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flusso del sistema di annunci vocali</title>
<desc>Un evento (seduta reale sul treno, o testo libero dal pannello admin) fa costruire una sequenza di clip audio dalla libreria in ReplicatedStorage. La sequenza viene riprodotta clip per clip attraverso oggetti Sound nuovi, instradati sul gruppo audio con riverbero dello speaker della stazione corretta, cosi' la coda di ogni clip puo' smorzarsi mentre parte il successivo.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="260" fill="#ffffff"/>

<rect x="20" y="20" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="105" y="42" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Player si siede</text>
<text x="105" y="60" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">sul VehicleSeat</text>

<rect x="20" y="90" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="105" y="112" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Admin scrive testo</text>
<text x="105" y="130" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">nel pannello annunci</text>

<line x1="190" y1="48" x2="220" y2="80" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="190" y1="118" x2="220" y2="90" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="55" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="315" y="77" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle">Costruisce la sequenza</text>
<text x="315" y="95" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle">di ID audio, in ordine</text>

<line x1="315" y1="30" x2="315" y2="55" stroke="#3d3d3a" stroke-width="1"/>
<rect x="220" y="0" width="190" height="26" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="315" y="17" font-family="sans-serif" font-size="11" fill="#412402" text-anchor="middle">libreria clip in ReplicatedStorage</text>

<line x1="410" y1="83" x2="440" y2="83" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="440" y="55" width="220" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="550" y="77" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Sound nuovo per clip</text>
<text x="550" y="95" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">sul SoundGroup con riverbero</text>

<line x1="550" y1="111" x2="550" y2="150" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="440" y="150" width="220" height="56" rx="8" fill="#E7EEFB" stroke="#2D5AA3" stroke-width="0.5"/>
<text x="550" y="172" font-family="sans-serif" font-size="14" font-weight="600" fill="#13264F" text-anchor="middle">Speaker della stazione</text>
<text x="550" y="190" font-family="sans-serif" font-size="12" fill="#1F3D79" text-anchor="middle">giusta (Porta Nuova / Lingotto)</text>

<text x="20" y="240" font-family="sans-serif" font-size="11" fill="#73726c">Ogni clip riprodotta e distrutta a parte: la coda di riverbero puo' smorzarsi mentre parte la successiva</text>
</svg>
