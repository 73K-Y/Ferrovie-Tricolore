<svg width="420" height="620" viewBox="0 0 420 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Linea Torino Porta Nuova - Genova Brignole, stile schematico</title>
<desc>Diagramma schematico in stile app di trasporto pubblico (linea verticale, fermate equidistanti), non una mappa geografica. Le 10 fermate sono reali, la spaziatura e' uniforme per leggibilita', non proporzionale alla distanza vera.</desc>
<rect width="420" height="620" fill="#ffffff"/>

<line x1="60" y1="50" x2="60" y2="570" stroke="#1D9E75" stroke-width="6" stroke-linecap="round"/>

<!-- Torino Porta Nuova, capolinea -->
<circle cx="60" cy="50" r="10" fill="#ffffff" stroke="#1D9E75" stroke-width="6"/>
<text x="85" y="45" font-family="sans-serif" font-size="15" font-weight="700" fill="#2C2C2A">Torino Porta Nuova</text>
<text x="85" y="63" font-family="sans-serif" font-size="11" fill="#73726c">km 0</text>

<circle cx="60" cy="108" r="6" fill="#1D9E75"/>
<text x="85" y="113" font-family="sans-serif" font-size="14" fill="#2C2C2A">Torino Lingotto</text>

<circle cx="60" cy="166" r="6" fill="#1D9E75"/>
<text x="85" y="171" font-family="sans-serif" font-size="14" fill="#2C2C2A">Asti</text>

<circle cx="60" cy="224" r="7" fill="#1D9E75"/>
<text x="85" y="229" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Alessandria</text>

<circle cx="60" cy="282" r="6" fill="#1D9E75"/>
<text x="85" y="287" font-family="sans-serif" font-size="14" fill="#2C2C2A">Novi Ligure</text>

<circle cx="60" cy="340" r="5" fill="#1D9E75"/>
<text x="85" y="345" font-family="sans-serif" font-size="13" fill="#444441">Serravalle Scrivia</text>

<circle cx="60" cy="398" r="5" fill="#1D9E75"/>
<text x="85" y="403" font-family="sans-serif" font-size="13" fill="#444441">Arquata Scrivia</text>

<circle cx="60" cy="456" r="6" fill="#1D9E75"/>
<text x="85" y="461" font-family="sans-serif" font-size="14" fill="#2C2C2A">Ronco Scrivia</text>

<circle cx="60" cy="514" r="6" fill="#1D9E75"/>
<text x="85" y="519" font-family="sans-serif" font-size="14" fill="#2C2C2A">Genova Piazza Principe</text>

<!-- Genova Brignole, capolinea -->
<circle cx="60" cy="570" r="10" fill="#ffffff" stroke="#A32D2D" stroke-width="6"/>
<text x="85" y="565" font-family="sans-serif" font-size="15" font-weight="700" fill="#501313">Genova Brignole</text>
<text x="85" y="583" font-family="sans-serif" font-size="11" fill="#73726c">capolinea</text>

<text x="20" y="605" font-family="sans-serif" font-size="10" fill="#73726c">10 fermate reali, spaziatura uniforme per leggibilita', non proporzionale alla distanza vera</text>
</svg>
