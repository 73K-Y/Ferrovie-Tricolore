<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Come vengono assegnati dinamicamente testa e coda del treno</title>
<desc>Il treno ha una locomotiva a ciascuna estremità, nessuna delle due è fissa come "testa". Quando il player si siede in una delle due, quella diventa la testa e l'altra diventa automaticamente la coda. Solo la coda conta per il rilevamento dei blocchi: quando esce da una zona di segnale, il blocco successivo viene marcato come occupato.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="220" fill="#ffffff"/>

<rect x="20" y="60" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="90" y="82" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Player si siede</text>
<text x="90" y="100" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">in una locomotiva</text>

<line x1="160" y1="88" x2="180" y2="88" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="180" y="60" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="255" y="82" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle">Quella diventa Testa</text>
<text x="255" y="100" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle">l'altra diventa Coda</text>

<line x1="330" y1="88" x2="350" y2="88" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="350" y="60" width="150" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="425" y="82" font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" text-anchor="middle">Coda esce da un</text>
<text x="425" y="100" font-family="sans-serif" font-size="12" fill="#3C3489" text-anchor="middle">segnale (conferma)</text>

<line x1="500" y1="88" x2="520" y2="88" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="520" y="60" width="140" height="56" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="590" y="82" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Blocco successivo</text>
<text x="590" y="100" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">marcato occupato</text>

<text x="90" y="150" font-family="sans-serif" font-size="12" fill="#3d3d3a">La Testa non conta mai per i blocchi.</text>
<text x="90" y="170" font-family="sans-serif" font-size="12" fill="#3d3d3a">Solo l'uscita confermata della Coda innesca l'occupazione</text>
<text x="90" y="190" font-family="sans-serif" font-size="12" fill="#3d3d3a">(non l'ingresso: un tocco senza uscita non conta come attraversamento).</text>
</svg>
