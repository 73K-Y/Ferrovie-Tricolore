<svg width="420" height="280" viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Linea merci Genova VTE - Milano Smistamento</title>
<desc>Diagramma schematico della tratta merci, scalo a scalo, senza fermate passeggeri intermedie.</desc>
<rect width="420" height="280" fill="#ffffff"/>

<line x1="60" y1="50" x2="60" y2="230" stroke="#5a5a64" stroke-width="6" stroke-linecap="round"/>

<circle cx="60" cy="50" r="10" fill="#ffffff" stroke="#5a5a64" stroke-width="6"/>
<text x="85" y="45" font-family="sans-serif" font-size="15" font-weight="700" fill="#2C2C2A">Genova VTE</text>
<text x="85" y="63" font-family="sans-serif" font-size="11" fill="#73726c">Voltri Terminal Europa, capolinea</text>

<circle cx="60" cy="230" r="10" fill="#ffffff" stroke="#A32D2D" stroke-width="6"/>
<text x="85" y="225" font-family="sans-serif" font-size="15" font-weight="700" fill="#501313">Milano Smistamento</text>
<text x="85" y="243" font-family="sans-serif" font-size="11" fill="#73726c">scalo merci, capolinea</text>

<text x="20" y="265" font-family="sans-serif" font-size="10" fill="#73726c">Nessuna fermata intermedia: i treni merci vanno da scalo a scalo, non nelle stazioni passeggeri</text>
</svg>
