<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Flusso dati dei cartelli orari, interamente lato server</title>
<desc>Il client conferma la tratta e chiede lo spawn al server. Il server scrive i dati del cartello orari, perche' gli attributi impostati dal client non replicano mai al server. Il server rileva anche il passaggio del treno ai segnali e aggiorna i cartelli direttamente, senza dipendere dallo streaming del client.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="220" fill="#ffffff"/>

<rect x="20" y="30" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="95" y="52" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Client conferma</text>
<text x="95" y="70" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">tratta nel menu</text>

<line x1="170" y1="58" x2="200" y2="58" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="175" y="48" font-family="sans-serif" font-size="11" fill="#73726c">RemoteEvent</text>

<rect x="200" y="30" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="290" y="52" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle">Server spawna il treno</text>
<text x="290" y="70" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle">e scrive i dati del cartello</text>

<line x1="290" y1="86" x2="290" y2="116" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="200" y="120" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="290" y="142" font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" text-anchor="middle">Coda passa un segnale</text>
<text x="290" y="160" font-family="sans-serif" font-size="12" fill="#633806" text-anchor="middle">(rilevato lato server)</text>

<line x1="380" y1="148" x2="410" y2="148" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="410" y="120" width="170" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="495" y="142" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Server aggiorna</text>
<text x="495" y="160" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">il cartello direttamente</text>

<text x="20" y="200" font-family="sans-serif" font-size="11" fill="#73726c">Nessun passaggio richiede che il client abbia gia' caricato il contenuto lontano</text>
</svg>
