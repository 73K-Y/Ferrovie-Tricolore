<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Perche' il treno non si muoveva: il ciclo di blocco del pantografo</title>
<desc>Un ciclo lato server azzera la velocita' lineare e angolare di ogni parte del treno, ogni frame, per tutto il tempo in cui il pantografo resta abbassato. Qualunque script di guida imposti la velocita' delle ruote, questo ciclo la sovrascrive subito dopo, mascherando qualunque altra correzione fatta altrove finche' il pantografo non viene alzato.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="280" fill="#ffffff"/>

<rect x="20" y="20" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="120" y="42" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Pantografo abbassato</text>
<text x="120" y="60" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">(stato di partenza, sempre)</text>

<line x1="120" y1="76" x2="120" y2="106" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="20" y="106" width="200" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="120" y="128" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Parte un ciclo server</text>
<text x="120" y="146" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">RunService.Heartbeat</text>

<line x1="220" y1="134" x2="440" y2="134" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="440" y="106" width="220" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="550" y="128" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Ogni parte del treno:</text>
<text x="550" y="146" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">velocita' lineare e angolare = 0</text>

<line x1="120" y1="162" x2="120" y2="192" stroke="#3d3d3a" stroke-width="1"/>
<rect x="20" y="192" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="120" y="214" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle">Qualsiasi script</text>
<text x="120" y="232" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">di guida, ignorato</text>

<line x1="220" y1="220" x2="440" y2="163" stroke="#3d3d3a" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<text x="330" y="200" font-family="sans-serif" font-size="11" fill="#73726c" text-anchor="middle">sovrascritto</text>
<text x="330" y="213" font-family="sans-serif" font-size="11" fill="#73726c" text-anchor="middle">il frame dopo</text>

<line x1="550" y1="162" x2="550" y2="192" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow2)"/>
<rect x="440" y="192" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="550" y="214" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle">Pantografo alzato</text>
<text x="550" y="232" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle">→ il ciclo si ferma da solo</text>

<text x="20" y="270" font-family="sans-serif" font-size="11" fill="#73726c">Confermato: la coppia, il raggio, gli attacchi delle ruote erano gia' tutti corretti — il ciclo mascherava la correzione, non la sostituiva</text>
</svg>
