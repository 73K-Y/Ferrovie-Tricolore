<svg width="420" height="560" viewBox="0 0 420 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Linea Torino Porta Nuova - Milano Centrale, stile schematico</title>
<desc>Diagramma schematico in stile app di trasporto pubblico, linea verticale con fermate equidistanti, non una mappa geografica. Le fermate sono reali (linea storica), la spaziatura e' uniforme per leggibilita'.</desc>
<rect width="420" height="560" fill="#ffffff"/>

<line x1="60" y1="50" x2="60" y2="510" stroke="#1D9E75" stroke-width="6" stroke-linecap="round"/>

<circle cx="60" cy="50" r="10" fill="#ffffff" stroke="#1D9E75" stroke-width="6"/>
<text x="85" y="45" font-family="sans-serif" font-size="15" font-weight="700" fill="#2C2C2A">Torino Porta Nuova</text>
<text x="85" y="63" font-family="sans-serif" font-size="11" fill="#73726c">km 0</text>

<circle cx="60" cy="105" r="6" fill="#1D9E75"/>
<text x="85" y="110" font-family="sans-serif" font-size="14" fill="#2C2C2A">Chivasso</text>

<circle cx="60" cy="160" r="5" fill="#1D9E75"/>
<text x="85" y="165" font-family="sans-serif" font-size="13" fill="#444441">Santhia'</text>

<circle cx="60" cy="215" r="6" fill="#1D9E75"/>
<text x="85" y="220" font-family="sans-serif" font-size="14" fill="#2C2C2A">Vercelli</text>

<circle cx="60" cy="270" r="7" fill="#1D9E75"/>
<text x="85" y="275" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Novara</text>

<circle cx="60" cy="325" r="5" fill="#1D9E75"/>
<text x="85" y="330" font-family="sans-serif" font-size="13" fill="#444441">Rho Fiera</text>

<circle cx="60" cy="380" r="5" fill="#1D9E75"/>
<text x="85" y="385" font-family="sans-serif" font-size="13" fill="#444441">Milano Certosa</text>

<circle cx="60" cy="435" r="5" fill="#1D9E75"/>
<text x="85" y="440" font-family="sans-serif" font-size="13" fill="#444441">Milano Porta Garibaldi</text>

<circle cx="60" cy="510" r="10" fill="#ffffff" stroke="#A32D2D" stroke-width="6"/>
<text x="85" y="505" font-family="sans-serif" font-size="15" font-weight="700" fill="#501313">Milano Centrale</text>
<text x="85" y="523" font-family="sans-serif" font-size="11" fill="#73726c">capolinea</text>

<text x="20" y="545" font-family="sans-serif" font-size="10" fill="#73726c">Fermate reali sulla linea storica, spaziatura uniforme per leggibilita', non proporzionale alla distanza vera</text>
</svg>
