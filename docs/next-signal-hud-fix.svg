<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Correzione dell'indicatore del segnale successivo nella cabina</title>
<desc>Prima: la ricerca guardava solo i figli diretti di workspace, dove nessun segnale vive davvero, e sceglieva il segnale fisicamente piu' vicino, che dopo averlo superato e' quello alle spalle. Dopo: la ricerca scende ricorsivamente nella gerarchia reale e sceglie il segnale piu' vicino strettamente avanti al treno lungo la linea.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="260" fill="#ffffff"/>

<text x="40" y="30" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Prima</text>
<rect x="40" y="46" width="280" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="180" y="68" font-family="sans-serif" font-size="14" font-weight="600" fill="#501313" text-anchor="middle">Segnale piu' vicino</text>
<text x="180" y="88" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">spesso quello gia' superato</text>

<text x="360" y="30" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Dopo</text>
<rect x="360" y="46" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text x="500" y="68" font-family="sans-serif" font-size="14" font-weight="600" fill="#173404" text-anchor="middle">Segnale successivo avanti</text>
<text x="500" y="88" font-family="sans-serif" font-size="12" fill="#27500A" text-anchor="middle">nella direzione di marcia</text>

<line x1="80" y1="150" x2="600" y2="150" stroke="#3d3d3a" stroke-width="2"/>
<circle cx="150" cy="150" r="6" fill="#888780"/>
<text x="150" y="175" font-family="sans-serif" font-size="12" fill="#444441" text-anchor="middle">treno</text>
<circle cx="350" cy="150" r="6" fill="#A32D2D"/>
<text x="350" y="130" font-family="sans-serif" font-size="12" fill="#791F1F" text-anchor="middle">superato</text>
<circle cx="500" cy="150" r="6" fill="#639922"/>
<text x="500" y="130" font-family="sans-serif" font-size="12" fill="#27500A" text-anchor="middle">successivo</text>

<line x1="150" y1="150" x2="335" y2="150" stroke="#A32D2D" stroke-width="2" opacity="0.4" marker-end="url(#arrow)"/>
<line x1="150" y1="160" x2="485" y2="160" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>

<text x="40" y="230" font-family="sans-serif" font-size="12" fill="#73726c">La ricerca ora scende ricorsivamente nella gerarchia reale, non solo nei figli diretti di workspace</text>
</svg>
